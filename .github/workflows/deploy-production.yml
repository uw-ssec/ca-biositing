name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT: biocirv-470318
  GCP_REGION: us-west1
  DEPLOY_ENV: production
  # These values come from Pulumi outputs after bootstrapping the production stack.
  # Run `DEPLOY_ENV=production pixi run -e deployment cloud-outputs` to verify.
  # NOTE: Update after first production deploy (Phase 4 bootstrap).
  WIF_PROVIDER: "<placeholder - update after production bootstrap>"
  DEPLOYER_SA: "biocirv-production-gh-deploy@biocirv-470318.iam.gserviceaccount.com"

jobs:
  # --- Compute image tag from release ---
  image-tag:
    name: Compute Image Tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Derive image tag from release or SHA
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            # Use the release tag (e.g., v1.2.3)
            TAG="${{ github.event.release.tag_name }}"
          else
            # workflow_dispatch: use short SHA
            TAG="${GITHUB_SHA::7}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

  deploy-infrastructure:
    name: Deploy Infrastructure (Pulumi)
    needs: image-tag
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.2
          environments: deployment

      - name: Deploy infrastructure
        env:
          IMAGE_TAG: ${{ needs.image-tag.outputs.image_tag }}
        run: pixi run -e deployment cloud-deploy-direct

  run-migrations:
    name: Run Database Migrations
    needs: [image-tag, deploy-infrastructure]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.2
          environments: deployment

      - name: Run Alembic migrations
        env:
          IMAGE_TAG: ${{ needs.image-tag.outputs.image_tag }}
        run: pixi run -e deployment cloud-migrate-ci

  update-services:
    name: Force Cloud Run Revision Updates
    needs: [image-tag, run-migrations]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.63.2
          environments: deployment

      - name: Force new Cloud Run revisions
        env:
          IMAGE_TAG: ${{ needs.image-tag.outputs.image_tag }}
        run: pixi run -e deployment cloud-update-services
