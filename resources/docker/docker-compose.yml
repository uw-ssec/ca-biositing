services:
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    container_name: BioCirV_ETL_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    shm_size: "1gb"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./create_prefect_db.sql:/docker-entrypoint-initdb.d/create_prefect_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prefect-network

  setup-db:
    build:
      context: ../..
      dockerfile: resources/docker/pipeline.dockerfile
    container_name: BioCirV_ETL_setup_db
    env_file:
      - .env
    volumes:
      # Adding the flow code to the worker
      - ../../alembic:/app/alembic
      - ../../alembic.ini:/app/alembic.ini
      - ./.env:/app/.env
    depends_on:
      db:
        condition: service_healthy
    command: alembic upgrade head
    networks:
      - prefect-network

  prefect-server:
    build:
      context: ../..
      dockerfile: resources/docker/pipeline.dockerfile
    container_name: BioCirV_ETL_prefect_server
    env_file:
      - .env
    environment:
      - PREFECT_UI_API_URL=/api
    ports:
      - "4200:4200"
    volumes:
      - prefectdata:/home/appuser/.prefect
    depends_on:
      db:
        condition: service_healthy
    command: prefect server start --host 0.0.0.0 --port 4200
    healthcheck:
      test: ["CMD", "curl", "-f", "${PREFECT_API_URL}/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - prefect-network

  prefect-worker:
    build:
      context: ../..
      dockerfile: resources/docker/pipeline.dockerfile
    container_name: BioCirV_ETL_prefect_worker
    env_file:
      - .env
    volumes:
      # Adding the flow code to the worker
      - ../../data:/app/data
      - ../prefect/run_prefect_flow.py:/app/run_prefect_flow.py
      - ../../credentials.json:/app/credentials.json
      - ../../alembic:/app/alembic
      - ../../alembic.ini:/app/alembic.ini
      - ../../src/ca_biositing/pipeline/ca_biositing:/app/.pixi/envs/etl/lib/python3.12/site-packages/ca_biositing
      - ../../src/ca_biositing/datamodels/ca_biositing/datamodels:/app/.pixi/envs/etl/lib/python3.12/site-packages/ca_biositing/datamodels
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    command: prefect worker start --type process --pool biocirv_dev_work_pool
    # healthcheck:
    #   test: ["CMD-SHELL", "prefect work-pool inspect $WORK_POOL"]
    #   timeout: 10s
    #   retries: 2
    networks:
      - prefect-network

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: BioCirV_ETL_oauth2_proxy
    ports:
      - "4180:4180"
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      - OAUTH2_PROXY_PROVIDER=google
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${OAUTH2_PROXY_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
      - OAUTH2_PROXY_UPSTREAMS=http://prefect-server:4200
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_REDIRECT_URL=http://localhost:4180/oauth2/callback
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_COOKIE_SECURE=false
      - OAUTH2_PROXY_COOKIE_REFRESH=1h
      - OAUTH2_PROXY_SKIP_AUTH_ROUTES=GET=^/api/health$$
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:4180/ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - prefect-network

volumes:
  pgdata:
  prefectdata:

networks:
  prefect-network:
    driver: bridge
